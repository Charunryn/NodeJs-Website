<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <a href="index.html" class="home-btn">Home</a>
    <title>Assassin's Creed Odyssey</title>
</head>
<body class="odyssey">
    <div class="container">

    <h1 class="title">Assassin's Creed Odyssey</h1>

    <p class="subtitle">Select a topic</p>

    <div class="menu">

  <a class="card" data-topic="Storyline">Storyline</a>
  <a class="card" data-topic="Characters">Characters</a>
  <a class="card" data-topic="World">World</a>

</div>

<br>
<iframe 
 width="1200" 
 height="600" 
 src="https://www.youtube.com/embed/6F8L3d_OIE0?si=9fvSg2_pyGJR5E8j"
 frameborder="0" 
 allowfullscreen></iframe>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
  </div>
</div>

<script>
const overlay = document.getElementById("overlay");
const modalTitle = document.getElementById("modal-title");
const modalText = document.getElementById("modal-text");

const content = {
  Storyline: "Follows a protagonist navigating a fractured family and their destiny during the Peloponnesian War. Choices shape alliances and the outcome of the story.",
  Characters: `Play as either Kassandra or Alexios, while meeting historical figures like Socrates and Pericles.
  <div class="character-grid">

    <div class="character-card">
      <img src="https://static.wikia.nocookie.net/assassinscreed/images/8/85/ACOD_Deimos_render.png/revision/latest?cb=20181023124709" class="character-modal-img" alt="Bayek">
      <p>Alexios</p>
    </div>

    <div class="character-card">
      <img src="https://static.wikia.nocookie.net/assassinscreed/images/7/7d/ACOD_Kassandra_Render_%28no_helmet%29.png/revision/latest/scale-to-width-down/1000?cb=20191020051616" class="character-modal-img">
      <p>Kassandra</p>
    </div>

    <div class="character-card">
      <img src="https://static.wikia.nocookie.net/assassinscreed/images/6/65/ACOD_Sokrates_Render.png/revision/latest?cb=20200325104220" class="character-modal-img">
      <p>Socrates</p>
    </div>

  </div>`,
  World: `<p>A vast recreation of ancient Greece with islands and major cities like Athens.</p>
  <img src="https://www.gamepressure.com/static/mapy/en/gfx/map_2268.jpg" alt="map">`
};

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {
    const topic = card.dataset.topic;

    modalTitle.textContent = topic.toUpperCase();
    modalText.innerHTML = content[topic];

    // remove previous special class
    document.getElementById("modal").classList.remove("odyssey-world-modal");

    document.getElementById("modal").classList.remove("characters-modal");

    document.getElementById("modal").classList.remove("storyline-modal");

    // add class ONLY for World
    if (topic === "World") {
      document.getElementById("modal").classList.add("odyssey-world-modal");
    }

    if (topic === "Characters") {
      document.getElementById("modal").classList.add("characters-modal");
    }

    if (topic === "Storyline") {
      document.getElementById("modal").classList.add("storyline-modal");
    }

    overlay.style.display = "flex";
  });
});

// close when clicking outside modal
overlay.addEventListener("click", (e) => {
  if (e.target === overlay) {
    overlay.style.display = "none";
  }
});
</script>
</html>
