<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <a href="index.html" class="home-btn">Home</a>
<title>Assassin's Creed Origins</title>
</head>

<body class="origins">
  <div class="container">

    <h1 class="title">Assassin's Creed Origins</h1>

    <h2 class="subtitle">Select a topic</h2>

    <div class="menu">

  <a class="card" data-topic="Storyline">Storyline</a>
  <a class="card" data-topic="Characters">Characters</a>
  <a class="card" data-topic="World">World</a>

</div>
<br>
<iframe 
  width="1200" 
  height="600"
  src="https://www.youtube.com/embed/XmZ0c3c9KL0?si=qWn7gEu7zeW5lIKv"
  frameborder="0"
  allowfullscreen>
</iframe>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
  </div>
</div>
</div>

<script>
const overlay = document.getElementById("overlay");
const modalTitle = document.getElementById("modal-title");
const modalText = document.getElementById("modal-text");

const content = {
  Storyline: "Follows a protagonist seeking revenge for a personal tragedy, which leads to the creation of the Assassin Brotherhood. The journey uncovers hidden powers controlling ancient Egypt.",
  Characters: `<p>Play as Bayek of Siwa, alongside key figures like Aya, while encountering members of the Order of the Ancients and historical figures such as Cleopatra.</p>
  <div class="character-grid">

    <div class="character-card">
      <img src="https://upload.wikimedia.org/wikipedia/en/9/93/BayekRender.png" alt="Bayek">
      <p>Bayek</p>
    </div>

    <div class="character-card">
      <img src="https://static.wikia.nocookie.net/assassinscreed/images/a/a6/ACO_Cleopatra_Render.png/revision/latest/scale-to-width-down/1000?cb=20200205110318" class="character-modal-img" alt="Cleopatra" width="300" height="500">
      <p>Cleopatra</p>
    </div>

  </div>`,
  World: `<p>Set in ancient Egypt, featuring deserts, pyramids, and cities like Alexandria.</p>
  <img src="https://i.redd.it/nbi2gg43o3uz.jpg" alt="map">`
};

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {
    const topic = card.dataset.topic;

    modalTitle.textContent = topic.toUpperCase();
    modalText.innerHTML = content[topic];

    // remove previous special class
    document.getElementById("modal").classList.remove("world-modal");

    document.getElementById("modal").classList.remove("characters-modal");

    document.getElementById("modal").classList.remove("storyline-modal");

    // add class ONLY for World
    if (topic === "World") {
      document.getElementById("modal").classList.add("world-modal");
    }

    if (topic === "Characters") {
      document.getElementById("modal").classList.add("characters-modal");
    }

    if (topic === "Storyline") {
      document.getElementById("modal").classList.add("storyline-modal");
    }

    overlay.style.display = "flex";
  });
});

// close when clicking outside modal
overlay.addEventListener("click", (e) => {
  if (e.target === overlay) {
    overlay.style.display = "none";
  }
});
</script>
</body>
</html>
